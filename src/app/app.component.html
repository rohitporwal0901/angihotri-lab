<div class="flex h-screen bg-[#F0F9FF] overflow-hidden">
  <!-- Desktop Sidebar -->
  <aside *ngIf="authService.user$ | async" class="hidden md:block">
    <app-sidebar class="h-full"></app-sidebar>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    <!-- Top Navbar -->
    <nav class="bg-white/80 backdrop-blur-xl border-b border-brand-teal/5 flex items-center justify-between px-6 md:px-10 py-5 sticky top-0 z-40">
      <div class="flex items-center gap-4 cursor-pointer group" routerLink="/">
        <div class="relative">
          <div class="absolute -inset-2 bg-gradient-to-tr from-brand-teal to-blue-500 rounded-[1.2rem] blur opacity-10 group-hover:opacity-30 transition duration-700"></div>
          <div class="relative w-14 h-14 bg-slate-950 rounded-[1.2rem] flex items-center justify-center border border-white/5 shadow-2xl transition-transform group-hover:scale-110">
            <svg class="w-9 h-9 text-brand-teal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v20M2 12h20" stroke-opacity="0.1"/>
              <path d="M4.5 16.5c-1.5 1.26-2 5.5-2 5.5s4.24-.5 5.5-2" />
              <path d="M19.5 16.5c1.5 1.26 2 5.5 2 5.5s-4.24-.5-5.5-2" />
              <path d="M12 2a10 10 0 0 1 10 10c0 5.5-4.5 10-10 10S2 17.5 2 12 6.5 2 12 2z" stroke-width="1.5" stroke-opacity="0.2" />
              <path d="M9 12h6M12 9v6" stroke-width="3" />
            </svg>
          </div>
        </div>
        <div class="hidden sm:block">
            <div class="flex items-baseline gap-1">
                <h1 class="text-2xl font-black text-slate-900 tracking-tighter leading-none">AGNIHOTRI</h1>
                <span class="w-1.5 h-1.5 rounded-full bg-brand-teal animate-pulse"></span>
            </div>
            <p class="text-[9px] font-black uppercase tracking-[0.4em] text-brand-teal mt-1">Medical Laboratory</p>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 hover:text-brand-teal transition-colors">
            <i class="lucide-bell w-5 h-5"></i>
        </button>
        <div class="h-8 w-[1px] bg-gray-100 hidden md:block"></div>
        <button *ngIf="!(authService.user$ | async)" routerLink="/login" class="bg-brand-teal text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-brand-dark transition-all shadow-md">
            Sign In
        </button>
      </div>
    </nav>

    <!-- Page Content -->
    <div class="flex-1 overflow-y-auto pb-20 md:pb-0 px-4 md:px-8 py-6">
      <router-outlet></router-outlet>
    </div>

    <!-- Mobile Bottom Navigation -->
    <app-bottom-nav *ngIf="authService.user$ | async"></app-bottom-nav>
  </main>
</div>
