<div class="flex h-screen bg-[#F0F9FF] overflow-hidden">
  <!-- Desktop Sidebar -->
  <aside *ngIf="authService.user$ | async" class="hidden md:block">
    <app-sidebar class="h-full"></app-sidebar>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    <!-- Top Navbar -->
    <nav class="bg-white/80 backdrop-blur-xl border-b border-brand-teal/5 flex items-center justify-between px-6 md:px-10 py-5 sticky top-0 z-40">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-brand-teal rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-teal/20">
            <span class="font-black">AL</span>
        </div>
        <div>
            <h1 class="text-xl font-black text-gray-900 tracking-tight leading-none">Agnihotri</h1>
            <span class="text-brand-teal font-bold text-[10px] uppercase tracking-[0.2em]">Medical Lab</span>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 hover:text-brand-teal transition-colors">
            <i class="lucide-bell w-5 h-5"></i>
        </button>
        <div class="h-8 w-[1px] bg-gray-100 hidden md:block"></div>
        <button *ngIf="!(authService.user$ | async)" routerLink="/login" class="bg-brand-teal text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-brand-dark transition-all shadow-md">
            Sign In
        </button>
      </div>
    </nav>

    <!-- Page Content -->
    <div class="flex-1 overflow-y-auto pb-20 md:pb-0 px-4 md:px-8 py-6">
      <router-outlet></router-outlet>
    </div>

    <!-- Mobile Bottom Navigation -->
    <app-bottom-nav *ngIf="authService.user$ | async"></app-bottom-nav>
  </main>
</div>
