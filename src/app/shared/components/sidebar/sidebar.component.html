<div class="hidden md:flex flex-col h-full w-72 bg-slate-900 p-8 transition-all relative overflow-hidden">
  <!-- Brand -->
  <div class="flex items-center gap-3 mb-12 relative z-10 px-2">
    <div class="w-10 h-10 bg-brand-teal rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-teal/20">
      <span class="font-black">AL</span>
    </div>
    <div class="flex flex-col">
        <span class="text-lg font-black text-white tracking-tight leading-none">Agnihotri</span>
        <span class="text-brand-teal text-[10px] font-black uppercase tracking-[0.2em]">Medical Lab</span>
    </div>
  </div>

  <!-- Menu -->
  <nav class="flex-1 space-y-2 relative z-10">
    <a *ngFor="let item of menuItems$ | async" 
       [routerLink]="item.route" 
       routerLinkActive="bg-brand-teal/10 text-brand-teal ring-1 ring-brand-teal/20"
       [routerLinkActiveOptions]="{exact: true}"
       class="flex items-center gap-4 px-6 py-4 rounded-2xl text-slate-400 font-black text-sm hover:bg-white/5 hover:text-white transition-all group">
      <lucide-icon [name]="item.icon" class="w-5 h-5 group-hover:scale-110 transition-transform"></lucide-icon>
      {{item.label}}
    </a>
  </nav>

  <!-- Logout Section -->
  <div *ngIf="authService.user$ | async as user" class="pt-8 border-t border-slate-800 relative z-10">
    <div class="flex items-center gap-4 mb-6 px-2">
        <div class="w-10 h-10 rounded-xl bg-brand-teal/20 flex items-center justify-center text-brand-teal font-black">
            {{user.displayName.substring(0,1)}}
        </div>
        <div class="flex-1 min-w-0">
            <p class="text-sm font-black text-white truncate">{{user.displayName}}</p>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{{user.role}}</p>
        </div>
    </div>
    <button (click)="authService.logout()" 
            class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-red-400 font-black text-sm hover:bg-red-500/10 transition-all group">
      <lucide-icon [name]="LogoutIcon" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></lucide-icon>
      Sign Out
    </button>
  </div>
</div>
