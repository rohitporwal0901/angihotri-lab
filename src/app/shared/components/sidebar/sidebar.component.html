<div class="flex flex-col h-full w-64 bg-white border-r border-gray-100 shadow-sm">
  <div class="p-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center text-white">
        <lucide-icon [name]="TrackingIcon" class="w-6 h-6"></lucide-icon>
      </div>
      <h1 class="text-xl font-bold text-gray-800 tracking-tight">Agnihotri <span class="text-teal-600">Lab</span></h1>
    </div>
  </div>

  <nav class="flex-1 px-4 space-y-2 mt-4">
    <a *ngFor="let item of menuItems" 
       [routerLink]="item.route" 
       routerLinkActive="bg-teal-50 text-teal-700 font-semibold"
       [routerLinkActiveOptions]="{exact: true}"
       class="flex items-center gap-3 px-4 py-3 text-gray-600 rounded-xl hover:bg-gray-50 transition-all duration-200 group">
      <lucide-icon [name]="item.icon" class="w-5 h-5 group-hover:text-teal-600 transition-colors"></lucide-icon>
      <span>{{item.label}}</span>
    </a>
  </nav>

  <div class="p-4 border-t border-gray-50">
    <ng-container *ngIf="authService.user$ | async as user; else noUser">
      <div class="bg-gray-50 p-4 rounded-2xl flex items-center gap-3 group relative cursor-pointer" (click)="authService.logout()">
        <div class="w-10 h-10 bg-gray-200 rounded-full overflow-hidden">
          <img [src]="user.photoURL || 'https://ui-avatars.com/api/?name=' + user.displayName + '&background=0d9488&color=fff'" alt="User">
        </div>
        <div class="flex-1 overflow-hidden">
          <p class="text-sm font-semibold text-gray-800 truncate">{{user.displayName}}</p>
          <p class="text-xs text-gray-500 truncate">{{user.role}}</p>
        </div>
        <div class="absolute inset-0 bg-red-600/10 opacity-0 group-hover:opacity-100 transition-opacity rounded-2xl flex items-center justify-center">
            <span class="text-xs font-bold text-red-600">Logout</span>
        </div>
      </div>
    </ng-container>
    <ng-template #noUser>
      <button routerLink="/login" 
              class="w-full flex items-center justify-center gap-2 py-4 bg-teal-600 text-white rounded-2xl font-bold shadow-lg shadow-teal-100 hover:bg-teal-700 transition-all">
        <lucide-icon [name]="LoginIcon" class="w-5 h-5"></lucide-icon>
        Sign In
      </button>
    </ng-template>
  </div>
</div>
