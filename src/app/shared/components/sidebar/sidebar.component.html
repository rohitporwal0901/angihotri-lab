<aside class="w-72 bg-slate-900 h-screen fixed left-0 top-0 overflow-y-auto flex flex-col p-8 border-r border-white/5">
    
    <!-- Branding -->
    <div class="flex items-center gap-3 mb-16">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-xl shadow-blue-500/20">
            <i-lucide name="flask-conical" class="text-white w-6 h-6"></i-lucide>
        </div>
        <div class="flex flex-col">
            <span class="text-lg font-black text-white tracking-tighter leading-none">AGNIHOTRI</span>
            <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em]">LAB PORTAL</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-grow space-y-2">
        <div *ngFor="let item of menuItems">
            <a [routerLink]="item.route" 
               routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-500/10"
               class="flex items-center gap-4 px-6 py-4 rounded-2xl text-white/50 font-black text-sm transition-all hover:text-white group">
                <i-lucide [name]="item.icon" class="w-5 h-5 group-hover:scale-110 transition-transform"></i-lucide>
                {{item.label}}
            </a>
        </div>
    </nav>

    <!-- User Profile & Logout -->
    <div class="pt-8 mt-8 border-t border-white/5 space-y-6">
        <div class="flex items-center gap-4 px-2">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black">
                {{ userName?.charAt(0) || 'U' }}
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-black text-white truncate max-w-[120px]">{{userName}}</span>
                <span class="text-[10px] font-black text-white/30 uppercase tracking-widest">{{userRole}}</span>
            </div>
        </div>

        <button (click)="logout()" 
                class="w-full py-4 rounded-2xl bg-white/5 text-rose-400 font-black text-sm uppercase tracking-widest flex items-center justify-center gap-3 hover:bg-rose-500/10 transition-all border border-transparent hover:border-rose-500/20">
            <i-lucide name="log-out" class="w-5 h-5"></i-lucide>
            Logout
        </button>
    </div>
</aside>
