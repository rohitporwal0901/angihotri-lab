<div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-brand-teal/5 flex justify-around items-center px-4 py-3 z-50 shadow-[0_-10px_30px_rgba(0,136,168,0.05)]">
  <a *ngFor="let item of navItems$ | async" 
     [routerLink]="item.route" 
     routerLinkActive="text-brand-teal"
     [routerLinkActiveOptions]="{exact: true}"
     class="flex flex-col items-center gap-1.5 px-3 py-1 transition-all group">
    <div class="relative">
        <lucide-icon [name]="item.icon" class="w-6 h-6 text-slate-400 group-[.text-brand-teal]:text-brand-teal group-[.text-brand-teal]:scale-110 transition-transform"></lucide-icon>
        <span class="absolute -top-1 -right-1 w-1.5 h-1.5 bg-brand-teal rounded-full opacity-0 group-[.text-brand-teal]:opacity-100 animate-pulse"></span>
    </div>
    <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 group-[.text-brand-teal]:text-brand-teal">{{item.label}}</span>
  </a>
</div>
