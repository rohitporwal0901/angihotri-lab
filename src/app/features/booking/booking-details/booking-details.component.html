<div class="max-w-5xl mx-auto" *ngIf="booking$ | async as booking">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-black text-gray-900 mb-2">Booking #{{booking.id.substring(0, 8)}}</h1>
      <p class="text-gray-500">Placed on {{booking.createdAt?.toDate() | date:'medium'}}</p>
    </div>
    <div class="bg-teal-50 text-teal-700 px-6 py-2 rounded-full font-bold border border-teal-100 uppercase tracking-widest text-xs">
      {{booking.status}}
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-10 mb-20">
    <!-- Status Timeline -->
    <div class="lg:col-span-1 space-y-8">
      <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-gray-50">
        <h3 class="text-lg font-bold text-gray-800 mb-8">Status Update</h3>
        <div class="space-y-10 relative">
          <!-- Connector Line -->
          <div class="absolute left-[1.2rem] top-2 bottom-2 w-0.5 bg-gray-100"></div>
          
          <div *ngFor="let s of statuses" class="flex items-start gap-4 relative z-10">
            <div [class]="isCompleted(s.status, booking.status) ? 'bg-teal-600 text-white shadow-lg shadow-teal-100' : 'bg-gray-100 text-gray-400'"
                 class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-500">
              <lucide-icon [name]="s.icon" class="w-5 h-5"></lucide-icon>
            </div>
            <div>
              <p [class]="isCompleted(s.status, booking.status) ? 'text-gray-900 font-bold' : 'text-gray-400 font-medium'"
                 class="text-sm transition-colors duration-500">{{s.label}}</p>
              <p class="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-tighter" *ngIf="isCompleted(s.status, booking.status)">Completed</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Technician Card -->
      <div *ngIf="booking.status === 'In-Transit'" class="bg-teal-900 text-white rounded-[2.5rem] p-8 shadow-xl">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-14 h-14 bg-teal-800 rounded-2xl overflow-hidden p-1">
            <img src="https://ui-avatars.com/api/?name=Technician&background=fff&color=0d9488" class="rounded-xl">
          </div>
          <div>
            <p class="text-teal-400 text-[10px] font-black uppercase tracking-widest">Assignee</p>
            <h4 class="text-lg font-bold">Harshit Agnihotri</h4>
          </div>
        </div>
        <div class="flex gap-4">
          <button class="flex-1 bg-white/10 hover:bg-white/20 p-4 rounded-2xl flex items-center justify-center gap-2 transition-all">
            <lucide-icon [name]="PhoneIcon" class="w-5 h-5"></lucide-icon>
            Call
          </button>
        </div>
      </div>
    </div>

    <!-- Live Map -->
    <div class="lg:col-span-2">
      <div class="bg-white rounded-[2.5rem] p-4 shadow-sm border border-gray-50 h-[600px] relative overflow-hidden">
        
        <!-- Live Badge -->
        <div class="absolute top-8 left-8 z-10 bg-red-600 text-white px-4 py-2 rounded-full font-black text-[10px] flex items-center gap-2 shadow-lg animate-pulse">
            <div class="w-2 h-2 bg-white rounded-full"></div>
            LIVE TRACKING
        </div>

        <google-map [options]="mapOptions" height="100%" width="100%" [center]="center" [zoom]="zoom">
          <!-- Customer Location -->
          <map-marker [position]="{lat: booking.address.lat, lng: booking.address.lng}" 
                    [options]="{icon: 'https://cdn-icons-png.flaticon.com/32/1476/1476140.png'}">
          </map-marker>

          <!-- Technician Location -->
          <map-marker *ngIf="tracking$ | async as tracking"
                    [position]="{lat: tracking.lat, lng: tracking.lng}"
                    [options]="{icon: 'https://cdn-icons-png.flaticon.com/32/7144/7144889.png'}">
          </map-marker>
        </google-map>

        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md px-8 py-4 rounded-2xl shadow-2xl border border-gray-100 min-w-[300px]">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-teal-50 rounded-full flex items-center justify-center text-teal-600">
                    <lucide-icon [name]="HomeIcon" class="w-5 h-5"></lucide-icon>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-tighter">Collection at</p>
                    <p class="text-xs font-medium text-gray-900 line-clamp-1">{{booking.address.fullAddress}}</p>
                </div>
            </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="!(booking$ | async)" class="flex items-center justify-center h-96">
    <div class="w-12 h-12 border-4 border-teal-600 border-t-transparent rounded-full animate-spin"></div>
</div>
