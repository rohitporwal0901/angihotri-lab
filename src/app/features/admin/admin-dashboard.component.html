<div class="flex h-screen bg-slate-50 overflow-hidden">
    <!-- Sidebar -->
    <app-sidebar></app-sidebar>

    <!-- Main Content -->
    <main class="flex-grow pl-72 overflow-y-auto">
        <header class="h-24 bg-white border-b border-slate-100 flex items-center justify-between px-12 sticky top-0 z-10">
            <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">Admin <span class="text-blue-600">Overview</span></h1>
            
            <div class="flex items-center gap-6">
                <button class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 hover:text-blue-600 transition-colors">
                    <i-lucide name="bell" class="w-5 h-5"></i-lucide>
                </button>
                <div class="h-8 w-px bg-slate-100"></div>
                <div class="flex items-center gap-3">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Laboratory Status</span>
                    <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                </div>
            </div>
        </header>

        <section class="p-12 space-y-12">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                <div *ngFor="let stat of stats" class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all">
                    <div [class]="'w-14 h-14 rounded-2xl flex items-center justify-center mb-6 ' + stat.color">
                        <i-lucide [name]="stat.icon" class="w-7 h-7"></i-lucide>
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">{{stat.label}}</p>
                    <h4 class="text-3xl font-black text-slate-900 mt-1 tracking-tighter">{{stat.value}}</h4>
                </div>
            </div>

            <!-- Content Area Placeholder -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white rounded-[2.5rem] border border-slate-100 p-10 min-h-[400px] flex flex-col items-center justify-center text-center space-y-4">
                    <div class="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center text-slate-200">
                        <i-lucide name="activity" class="w-10 h-10"></i-lucide>
                    </div>
                    <h5 class="text-xl font-black text-slate-800">Operational Report</h5>
                    <p class="text-sm font-bold text-slate-400 max-w-sm">Deeper insights and data visualizations will be integrated here.</p>
                </div>

                <div class="bg-indigo-600 rounded-[2.5rem] p-10 text-white space-y-8 flex flex-col justify-between">
                    <div>
                        <h5 class="text-2xl font-black tracking-tighter leading-tight">Quick Actions</h5>
                        <p class="text-white/40 font-bold text-sm mt-2 leading-relaxed">Common administrative tasks for laboratory oversight.</p>
                    </div>
                    <div class="space-y-4">
                        <button class="w-full py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm font-black text-left px-6 transition-all flex items-center justify-between">
                            Add New Staff <i-lucide name="plus" class="w-4 h-4"></i-lucide>
                        </button>
                        <button class="w-full py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-sm font-black text-left px-6 transition-all flex items-center justify-between">
                            Generate Daily Report <i-lucide name="file-text" class="w-4 h-4"></i-lucide>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
