<div class="min-h-screen flex items-center justify-center bg-brand-mint px-4 py-8 relative overflow-hidden">
  <!-- Decorative background -->
  <div class="absolute top-0 left-0 w-full h-full opacity-30 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-brand-teal/20 rounded-full blur-[150px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-brand-teal/10 rounded-full blur-[150px]"></div>
  </div>

  <div class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-xl p-8 md:p-12 rounded-[2.5rem] shadow-[0_40px_100px_rgba(0,136,168,0.1)] border border-white/50 relative z-10">
    <div class="text-center">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-brand-teal rounded-3xl text-white mb-8 shadow-2xl shadow-brand-teal/30">
        <lucide-icon [name]="LoginIcon" class="w-10 h-10"></lucide-icon>
      </div>
      <h2 class="text-3xl font-black text-slate-900 tracking-tight leading-none mb-3">Welcome Back</h2>
      <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Please sign in to continue</p>
    </div>

    <form class="mt-10 space-y-6" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div class="relative group">
          <div class="relative">
            <input type="email" [(ngModel)]="email" name="email" required
                   class="appearance-none block w-full px-12 py-5 border-none bg-slate-50 placeholder-slate-300 text-slate-900 rounded-2xl focus:ring-2 focus:ring-brand-teal focus:bg-white transition-all font-bold" 
                   placeholder="Email Address">
            <lucide-icon [name]="MailIcon" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5 group-focus-within:text-brand-teal transition-colors"></lucide-icon>
          </div>
        </div>

        <div class="relative group">
          <div class="relative">
            <input type="password" [(ngModel)]="pass" name="pass" required
                   class="appearance-none block w-full px-12 py-5 border-none bg-slate-50 placeholder-slate-300 text-slate-900 rounded-2xl focus:ring-2 focus:ring-brand-teal focus:bg-white transition-all font-bold" 
                   placeholder="Password">
            <lucide-icon [name]="LockIcon" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5 group-focus-within:text-brand-teal transition-colors"></lucide-icon>
          </div>
        </div>
      </div>

      <div *ngIf="error" class="bg-red-50 text-red-600 p-4 rounded-xl text-xs font-black border border-red-100 flex items-center gap-2 animate-shake">
        <span class="w-1.5 h-1.5 bg-red-600 rounded-full animate-pulse"></span>
        {{error}}
      </div>

      <div class="pt-4">
        <button type="submit" [disabled]="loading"
                class="w-full flex justify-center py-5 px-4 text-base font-black rounded-2xl text-white bg-brand-teal hover:bg-brand-dark transition-all shadow-xl shadow-brand-teal/20 active:scale-95 disabled:opacity-50">
          <span *ngIf="!loading">Sign In</span>
          <div *ngIf="loading" class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>
      </div>

      <div class="relative py-2">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
        <div class="relative flex justify-center text-[8px] uppercase tracking-[0.4em]"><span class="bg-white/0 px-4 text-slate-300 font-black">Or secure entry via</span></div>
      </div>

      <button type="button" (click)="googleLogin()" [disabled]="loading"
              class="w-full flex items-center justify-center gap-4 py-4 px-4 border-2 border-slate-50 bg-white rounded-2xl text-sm font-black text-slate-700 hover:border-brand-teal/10 transition-all active:scale-95">
        <lucide-icon [name]="GoogleIcon" class="w-5 h-5 text-brand-teal"></lucide-icon>
        Google Account
      </button>
    </form>

    <p class="text-center text-xs font-bold text-slate-400">
      New to Agnihotri Lab? 
      <a routerLink="/signup" class="text-brand-teal font-black hover:underline underline-offset-4 decoration-2">Create Account</a>
    </p>
  </div>
</div>
